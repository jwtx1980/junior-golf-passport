<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80" role="img" aria-labelledby="title">
  <title id="title">Personal best stamp</title>
  <defs>
    <filter id="rough-best">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="98" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.7"/>
    </filter>
    <style>
      .ink{fill:none;stroke:#d9a741;stroke-linecap:round;stroke-linejoin:round}
      .fill{fill:#d9a741}
      .text{fill:#d9a741;font-family:Inter,Arial,sans-serif;font-size:6px;font-weight:900;letter-spacing:1px}
    </style>
  </defs>
  <g filter="url(#rough-best)" opacity=".95">
    <circle class="ink" cx="40" cy="40" r="35" stroke-width="3.2"/>
    <circle class="ink" cx="40" cy="40" r="29" stroke-width="1.5" stroke-dasharray="4 3"/>
    <circle class="ink" cx="40" cy="34" r="12" stroke-width="2.3"/>
    <path class="ink" d="M40 24l3 6.2 6.8 1-4.9 4.8 1.2 6.8L40 39.6l-6.1 3.2 1.2-6.8-4.9-4.8 6.8-1z" stroke-width="1.7"/>
    <path class="ink" d="M33 44l-5 14 9-5 3 8 3-8 9 5-5-14" stroke-width="2.1"/>
    <text class="text" x="40" y="18" text-anchor="middle">PERSONAL</text>
    <text class="text" x="40" y="67" text-anchor="middle">BEST</text>
    <path class="ink" d="M18 41h5M57 41h5M21 29l4 2M55 31l4-2" stroke-width="1.4" opacity=".5"/>
    <circle class="fill" cx="61" cy="51" r=".9" opacity=".38"/>
  </g>
</svg>
