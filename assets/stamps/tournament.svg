    <path class="ink" d="M40 29l2.2 4.5 5 .7-3.6 3.5.9 5-4.5-2.4-4.5 2.4.9-5-3.6-3.5 5-.7z" stroke-width="1.5"/>
    <text class="text" x="40" y="18" text-anchor="middle">EVENT</text>
    <text class="text" x="40" y="68" text-anchor="middle">TOURNAMENT</text>
    <circle class="fill" cx="19" cy="45" r=".9" opacity=".36"/>
    <circle class="fill" cx="61" cy="47" r=".9" opacity=".36"/>
