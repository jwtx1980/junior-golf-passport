<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80" role="img" aria-labelledby="title">
  <title id="title">Tournament stamp</title>
  <defs>
    <filter id="rough-tournament">
      <feTurbulence type="fractalNoise" baseFrequency="0.88" numOctaves="2" seed="109" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.7"/>
    </filter>
    <style>
      .ink{fill:none;stroke:#1d3142;stroke-linecap:round;stroke-linejoin:round}
      .fill{fill:#1d3142}
      .text{fill:#1d3142;font-family:Inter,Arial,sans-serif;font-size:6px;font-weight:900;letter-spacing:.8px}
    </style>
  </defs>
  <g filter="url(#rough-tournament)" opacity=".93">
    <circle class="ink" cx="40" cy="40" r="35" stroke-width="3.2"/>
    <circle class="ink" cx="40" cy="40" r="29" stroke-width="1.5" stroke-dasharray="3 3"/>
    <path class="ink" d="M31 25h18v9c0 7-4 12-9 12s-9-5-9-12z" stroke-width="2.3"/>
