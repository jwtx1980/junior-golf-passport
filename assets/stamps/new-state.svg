<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80" role="img" aria-labelledby="title">
  <title id="title">New state stamp</title>
  <defs>
    <filter id="rough-state">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="21" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.7"/>
    </filter>
    <style>
      .ink{fill:none;stroke:#9b5a17;stroke-linecap:round;stroke-linejoin:round}
      .fill{fill:#9b5a17}
      .text{fill:#9b5a17;font-family:Inter,Arial,sans-serif;font-size:8px;font-weight:950;letter-spacing:1px}
    </style>
  </defs>
  <g filter="url(#rough-state)" opacity=".94">
    <circle class="ink" cx="40" cy="40" r="35" stroke-width="3.2"/>
    <circle class="ink" cx="40" cy="40" r="29" stroke-width="1.6" stroke-dasharray="2.5 3.5"/>
    <path class="ink" d="M25 43l5-14 15-4 11 8-4 17-14 5-12-5z" stroke-width="2.4"/>
    <path class="ink" d="M37 29l4 8 9 1-6.5 5.5 2 8.5-7.5-4.6-7.7 4.2 2.4-8.4-6.2-5.9 9-.6z" stroke-width="1.8"/>
    <path class="ink" d="M22 54c10 5 26 5 36 0" stroke-width="1.5" opacity=".65"/>
    <text class="text" x="40" y="19" text-anchor="middle">NEW</text>
    <text class="text" x="40" y="66" text-anchor="middle">STATE</text>
    <circle class="fill" cx="20" cy="39" r=".9" opacity=".38"/>
    <circle class="fill" cx="62" cy="47" r="1.1" opacity=".35"/>
  </g>
</svg>
