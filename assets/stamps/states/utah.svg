<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80" role="img" aria-labelledby="title">
  <title id="title">Utah stamp</title>
  <defs>
    <filter id="rough-utah">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="243" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.65"/>
    </filter>
    <style>
      .ink{fill:none;stroke:#d8634b;stroke-linecap:round;stroke-linejoin:round}
      .fill{fill:#d8634b}
      .text{fill:#d8634b;font-family:Inter,Arial,sans-serif;font-size:5.6px;font-weight:900;letter-spacing:.7px}
      .abbr{fill:#d8634b;font-family:Inter,Arial,sans-serif;font-size:8px;font-weight:950;letter-spacing:1px}
      .mini{fill:#d8634b;font-family:Inter,Arial,sans-serif;font-size:8px;font-weight:950;letter-spacing:0}
    </style>
  </defs>
  <g filter="url(#rough-utah)" opacity=".94">
    <circle class="ink" cx="40" cy="40" r="35" stroke-width="3.2"/>
    <circle class="ink" cx="40" cy="40" r="29" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text class="text" x="40" y="17" text-anchor="middle">UTAH</text>
    <g>
    <path class="ink" d="M28 53h24M29 45h22M31 37h18M34 29h12M40 22c7 5 12 17 12 31H28c0-14 5-26 12-31z" stroke-width="2.2"/>
    <path class="ink" d="M36 53c0-4 8-4 8 0" stroke-width="1.7"/>
    <circle class="fill" cx="55" cy="34" r="1.2"/>
    <path class="ink" d="M53 31l5 5" stroke-width="1.2"/></g>
    <text class="abbr" x="40" y="68" text-anchor="middle">UT - BEEHIVE</text>
    <circle class="fill" cx="21" cy="47" r=".9" opacity=".32"/>
    <circle class="fill" cx="58" cy="43" r=".8" opacity=".3"/>
  </g>
</svg>
