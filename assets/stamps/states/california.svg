<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80" role="img" aria-labelledby="title">
  <title id="title">California stamp</title>
  <defs>
    <filter id="rough-california">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="204" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.65"/>
    </filter>
    <style>
      .ink{fill:none;stroke:#174d39;stroke-linecap:round;stroke-linejoin:round}
      .fill{fill:#174d39}
      .text{fill:#174d39;font-family:Inter,Arial,sans-serif;font-size:5.6px;font-weight:900;letter-spacing:.7px}
      .abbr{fill:#174d39;font-family:Inter,Arial,sans-serif;font-size:8px;font-weight:950;letter-spacing:1px}
      .mini{fill:#174d39;font-family:Inter,Arial,sans-serif;font-size:8px;font-weight:950;letter-spacing:0}
    </style>
  </defs>
  <g filter="url(#rough-california)" opacity=".94">
    <circle class="ink" cx="40" cy="40" r="35" stroke-width="3.2"/>
    <circle class="ink" cx="40" cy="40" r="29" stroke-width="1.5" stroke-dasharray="3 3"/>
    <text class="text" x="40" y="17" text-anchor="middle">CALIFORNIA</text>
    <g>
    <circle class="ink" cx="51" cy="29" r="8" stroke-width="2"/>
    <path class="ink" d="M35 56c3-10 4-21 1-31" stroke-width="3"/>
    <path class="ink" d="M36 27c-8 0-13 4-16 10M36 27c-4-7-10-9-16-8M36 27c7-6 14-7 21-2M36 27c5 2 9 6 12 12" stroke-width="2"/>
    <path class="ink" d="M25 56h29" stroke-width="2"/></g>
    <text class="abbr" x="40" y="68" text-anchor="middle">CA - SUN PALM</text>
    <circle class="fill" cx="18" cy="44" r=".9" opacity=".32"/>
    <circle class="fill" cx="57" cy="37" r=".8" opacity=".3"/>
  </g>
</svg>
