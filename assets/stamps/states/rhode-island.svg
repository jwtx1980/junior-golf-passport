<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80" role="img" aria-labelledby="title">
  <title id="title">Rhode Island stamp</title>
  <defs>
    <filter id="rough-rhode-island">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="238" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.65"/>
    </filter>
    <style>
      .ink{fill:none;stroke:#d8634b;stroke-linecap:round;stroke-linejoin:round}
      .fill{fill:#d8634b}
      .text{fill:#d8634b;font-family:Inter,Arial,sans-serif;font-size:5px;font-weight:900;letter-spacing:.7px}
      .abbr{fill:#d8634b;font-family:Inter,Arial,sans-serif;font-size:8px;font-weight:950;letter-spacing:1px}
      .mini{fill:#d8634b;font-family:Inter,Arial,sans-serif;font-size:8px;font-weight:950;letter-spacing:0}
    </style>
  </defs>
  <g filter="url(#rough-rhode-island)" opacity=".94">
    <circle class="ink" cx="40" cy="40" r="35" stroke-width="3.2"/>
    <circle class="ink" cx="40" cy="40" r="29" stroke-width="1.5" stroke-dasharray="3 3"/>
    <text class="text" x="40" y="17" text-anchor="middle">RHODE ISLAND</text>
    <g>
    <circle class="ink" cx="40" cy="25" r="5" stroke-width="2"/>
    <path class="ink" d="M40 30v28M28 38h24M26 48c2 8 7 12 14 12s12-4 14-12M26 48l-5 5M54 48l5 5" stroke-width="2.5"/></g>
    <text class="abbr" x="40" y="68" text-anchor="middle">RI - ANCHOR</text>
    <circle class="fill" cx="20" cy="42" r=".9" opacity=".32"/>
    <circle class="fill" cx="58" cy="38" r=".8" opacity=".3"/>
  </g>
</svg>
