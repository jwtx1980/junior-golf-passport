<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80" role="img" aria-labelledby="title">
  <title id="title">N. Dakota stamp</title>
  <defs>
    <filter id="rough-north-dakota">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="233" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.65"/>
    </filter>
    <style>
      .ink{fill:none;stroke:#d8634b;stroke-linecap:round;stroke-linejoin:round}
      .fill{fill:#d8634b}
      .text{fill:#d8634b;font-family:Inter,Arial,sans-serif;font-size:5.6px;font-weight:900;letter-spacing:.7px}
      .abbr{fill:#d8634b;font-family:Inter,Arial,sans-serif;font-size:8px;font-weight:950;letter-spacing:1px}
      .mini{fill:#d8634b;font-family:Inter,Arial,sans-serif;font-size:8px;font-weight:950;letter-spacing:0}
    </style>
  </defs>
  <g filter="url(#rough-north-dakota)" opacity=".94">
    <circle class="ink" cx="40" cy="40" r="35" stroke-width="3.2"/>
    <circle class="ink" cx="40" cy="40" r="29" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text class="text" x="40" y="17" text-anchor="middle">N. DAKOTA</text>
    <g>
    <path class="ink" d="M40 22v37" stroke-width="2.4"/>
    <path class="ink" d="M39 29c-8 0-10-5-10-8 7 0 10 3 10 8zM41 35c8 0 10-5 10-8-7 0-10 3-10 8zM39 42c-8 0-10-5-10-8 7 0 10 3 10 8zM41 48c8 0 10-5 10-8-7 0-10 3-10 8zM39 55c-8 0-10-5-10-8 7 0 10 3 10 8z" stroke-width="1.8"/></g>
    <text class="abbr" x="40" y="68" text-anchor="middle">ND - WHEAT</text>
    <circle class="fill" cx="19" cy="46" r=".9" opacity=".32"/>
    <circle class="fill" cx="58" cy="33" r=".8" opacity=".3"/>
  </g>
</svg>
