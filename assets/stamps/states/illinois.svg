<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80" role="img" aria-labelledby="title">
  <title id="title">Illinois stamp</title>
  <defs>
    <filter id="rough-illinois">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="212" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.65"/>
    </filter>
    <style>
      .ink{fill:none;stroke:#9b5a17;stroke-linecap:round;stroke-linejoin:round}
      .fill{fill:#9b5a17}
      .text{fill:#9b5a17;font-family:Inter,Arial,sans-serif;font-size:5.6px;font-weight:900;letter-spacing:.7px}
      .abbr{fill:#9b5a17;font-family:Inter,Arial,sans-serif;font-size:8px;font-weight:950;letter-spacing:1px}
      .mini{fill:#9b5a17;font-family:Inter,Arial,sans-serif;font-size:8px;font-weight:950;letter-spacing:0}
    </style>
  </defs>
  <g filter="url(#rough-illinois)" opacity=".94">
    <circle class="ink" cx="40" cy="40" r="35" stroke-width="3.2"/>
    <circle class="ink" cx="40" cy="40" r="29" stroke-width="1.5" stroke-dasharray="3 3"/>
    <text class="text" x="40" y="17" text-anchor="middle">ILLINOIS</text>
    <g><path class="ink" d="M22 55h36M26 55V37h7v18M36 55V28h8v27M48 55V34h7v21" stroke-width="2.3"/><path class="ink" d="M28 31h26M25 48h33" stroke-width="1.5" opacity=".55"/></g>
    <text class="abbr" x="40" y="68" text-anchor="middle">IL - SKYLINE</text>
    <circle class="fill" cx="18" cy="43" r=".9" opacity=".32"/>
    <circle class="fill" cx="59" cy="34" r=".8" opacity=".3"/>
  </g>
</svg>
