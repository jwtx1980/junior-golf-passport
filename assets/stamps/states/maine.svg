<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80" role="img" aria-labelledby="title">
  <title id="title">Maine stamp</title>
  <defs>
    <filter id="rough-maine">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="218" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.65"/>
    </filter>
    <style>
      .ink{fill:none;stroke:#d8634b;stroke-linecap:round;stroke-linejoin:round}
      .fill{fill:#d8634b}
      .text{fill:#d8634b;font-family:Inter,Arial,sans-serif;font-size:5.6px;font-weight:900;letter-spacing:.7px}
      .abbr{fill:#d8634b;font-family:Inter,Arial,sans-serif;font-size:8px;font-weight:950;letter-spacing:1px}
      .mini{fill:#d8634b;font-family:Inter,Arial,sans-serif;font-size:8px;font-weight:950;letter-spacing:0}
    </style>
  </defs>
  <g filter="url(#rough-maine)" opacity=".94">
    <circle class="ink" cx="40" cy="40" r="35" stroke-width="3.2"/>
    <circle class="ink" cx="40" cy="40" r="29" stroke-width="1.5" stroke-dasharray="3 3"/>
    <text class="text" x="40" y="17" text-anchor="middle">MAINE</text>
    <g>
    <path class="ink" d="M40 29v27M33 36c-8-3-12-9-8-14 6 1 8 6 7 12M47 36c8-3 12-9 8-14-6 1-8 6-7 12" stroke-width="2.2"/>
    <path class="ink" d="M32 39h16M33 46h14M35 55l-5 5M45 55l5 5M36 29l-4-6M44 29l4-6" stroke-width="1.8"/>
    <circle class="fill" cx="36" cy="31" r="1.1"/>
    <circle class="fill" cx="44" cy="31" r="1.1"/></g>
    <text class="abbr" x="40" y="68" text-anchor="middle">ME - LOBSTER</text>
    <circle class="fill" cx="20" cy="40" r=".9" opacity=".32"/>
    <circle class="fill" cx="58" cy="40" r=".8" opacity=".3"/>
  </g>
</svg>
