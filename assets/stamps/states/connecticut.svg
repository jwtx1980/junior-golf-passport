<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80" role="img" aria-labelledby="title">
  <title id="title">Connecticut stamp</title>
  <defs>
    <filter id="rough-connecticut">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="206" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.65"/>
    </filter>
    <style>
      .ink{fill:none;stroke:#1d3142;stroke-linecap:round;stroke-linejoin:round}
      .fill{fill:#1d3142}
      .text{fill:#1d3142;font-family:Inter,Arial,sans-serif;font-size:5px;font-weight:900;letter-spacing:.7px}
      .abbr{fill:#1d3142;font-family:Inter,Arial,sans-serif;font-size:8px;font-weight:950;letter-spacing:1px}
      .mini{fill:#1d3142;font-family:Inter,Arial,sans-serif;font-size:8px;font-weight:950;letter-spacing:0}
    </style>
  </defs>
  <g filter="url(#rough-connecticut)" opacity=".94">
    <circle class="ink" cx="40" cy="40" r="35" stroke-width="3.2"/>
    <circle class="ink" cx="40" cy="40" r="29" stroke-width="1.5" stroke-dasharray="3 3"/>
    <text class="text" x="40" y="17" text-anchor="middle">CONNECTICUT</text>
    <g>
    <path class="ink" d="M40 22c5 5 8 11 8 18" stroke-width="2"/>
    <circle class="ink" cx="34" cy="36" r="4" stroke-width="2"/>
    <circle class="ink" cx="43" cy="36" r="4" stroke-width="2"/>
    <circle class="ink" cx="38" cy="44" r="4" stroke-width="2"/>
    <circle class="ink" cx="47" cy="44" r="4" stroke-width="2"/>
    <circle class="ink" cx="42" cy="52" r="4" stroke-width="2"/>
    <path class="ink" d="M41 24c5-4 11-4 16-1-4 5-10 6-16 1z" stroke-width="2"/></g>
    <text class="abbr" x="40" y="68" text-anchor="middle">CT - GRAPES</text>
    <circle class="fill" cx="20" cy="46" r=".9" opacity=".32"/>
    <circle class="fill" cx="60" cy="39" r=".8" opacity=".3"/>
  </g>
</svg>
