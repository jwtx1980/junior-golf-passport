<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80" role="img" aria-labelledby="title">
  <title id="title">Iowa stamp</title>
  <defs>
    <filter id="rough-iowa">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="214" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.65"/>
    </filter>
    <style>
      .ink{fill:none;stroke:#174d39;stroke-linecap:round;stroke-linejoin:round}
      .fill{fill:#174d39}
      .text{fill:#174d39;font-family:Inter,Arial,sans-serif;font-size:5.6px;font-weight:900;letter-spacing:.7px}
      .abbr{fill:#174d39;font-family:Inter,Arial,sans-serif;font-size:8px;font-weight:950;letter-spacing:1px}
      .mini{fill:#174d39;font-family:Inter,Arial,sans-serif;font-size:8px;font-weight:950;letter-spacing:0}
    </style>
  </defs>
  <g filter="url(#rough-iowa)" opacity=".94">
    <circle class="ink" cx="40" cy="40" r="35" stroke-width="3.2"/>
    <circle class="ink" cx="40" cy="40" r="29" stroke-width="1.5" stroke-dasharray="3 3"/>
    <text class="text" x="40" y="17" text-anchor="middle">IOWA</text>
    <g>
    <path class="ink" d="M40 23c8 7 8 25 0 34-8-9-8-27 0-34z" stroke-width="2.4"/>
    <path class="ink" d="M40 23v34M33 35h14M33 43h14M35 28c2 6 8 7 10 0M35 51c2-6 8-7 10 0" stroke-width="1.5"/>
    <path class="ink" d="M33 55c-8-6-10-15-7-25M47 55c8-6 10-15 7-25" stroke-width="2"/></g>
    <text class="abbr" x="40" y="68" text-anchor="middle">IA - CORN</text>
    <circle class="fill" cx="20" cy="45" r=".9" opacity=".32"/>
    <circle class="fill" cx="57" cy="36" r=".8" opacity=".3"/>
  </g>
</svg>
