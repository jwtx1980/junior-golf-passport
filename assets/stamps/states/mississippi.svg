<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80" role="img" aria-labelledby="title">
  <title id="title">Mississippi stamp</title>
  <defs>
    <filter id="rough-mississippi">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="223" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.65"/>
    </filter>
    <style>
      .ink{fill:none;stroke:#d8634b;stroke-linecap:round;stroke-linejoin:round}
      .fill{fill:#d8634b}
      .text{fill:#d8634b;font-family:Inter,Arial,sans-serif;font-size:5px;font-weight:900;letter-spacing:.7px}
      .abbr{fill:#d8634b;font-family:Inter,Arial,sans-serif;font-size:8px;font-weight:950;letter-spacing:1px}
      .mini{fill:#d8634b;font-family:Inter,Arial,sans-serif;font-size:8px;font-weight:950;letter-spacing:0}
    </style>
  </defs>
  <g filter="url(#rough-mississippi)" opacity=".94">
    <circle class="ink" cx="40" cy="40" r="35" stroke-width="3.2"/>
    <circle class="ink" cx="40" cy="40" r="29" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text class="text" x="40" y="17" text-anchor="middle">MISSISSIPPI</text>
    <g>
    <path class="ink" d="M40 40c-6-8-5-15 0-20 5 5 6 12 0 20zM40 40c8-6 15-5 20 0-5 5-12 6-20 0zM40 40c6 8 5 15 0 20-5-5-6-12 0-20zM40 40c-8 6-15 5-20 0 5-5 12-6 20 0z" stroke-width="2.1"/>
    <circle class="ink" cx="40" cy="40" r="4" stroke-width="2"/></g>
    <text class="abbr" x="40" y="68" text-anchor="middle">MS - MAGNOLIA</text>
    <circle class="fill" cx="21" cy="45" r=".9" opacity=".32"/>
    <circle class="fill" cx="58" cy="34" r=".8" opacity=".3"/>
  </g>
</svg>
