<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80" role="img" aria-labelledby="title">
  <title id="title">New Jersey stamp</title>
  <defs>
    <filter id="rough-new-jersey">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="229" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.65"/>
    </filter>
    <style>
      .ink{fill:none;stroke:#174d39;stroke-linecap:round;stroke-linejoin:round}
      .fill{fill:#174d39}
      .text{fill:#174d39;font-family:Inter,Arial,sans-serif;font-size:5.6px;font-weight:900;letter-spacing:.7px}
      .abbr{fill:#174d39;font-family:Inter,Arial,sans-serif;font-size:8px;font-weight:950;letter-spacing:1px}
      .mini{fill:#174d39;font-family:Inter,Arial,sans-serif;font-size:8px;font-weight:950;letter-spacing:0}
    </style>
  </defs>
  <g filter="url(#rough-new-jersey)" opacity=".94">
    <circle class="ink" cx="40" cy="40" r="35" stroke-width="3.2"/>
    <circle class="ink" cx="40" cy="40" r="29" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text class="text" x="40" y="17" text-anchor="middle">NEW JERSEY</text>
    <g>
    <path class="ink" d="M20 53h40M25 45h30M29 37h22M33 29h14" stroke-width="2"/>
    <path class="ink" d="M27 53l9-24M53 53l-9-24M33 29c3-7 11-7 14 0" stroke-width="2"/>
    <path class="ink" d="M19 58c8-3 14 3 21 0s13 3 21 0" stroke-width="1.6"/></g>
    <text class="abbr" x="40" y="68" text-anchor="middle">NJ - BOARDWALK</text>
    <circle class="fill" cx="19" cy="42" r=".9" opacity=".32"/>
    <circle class="fill" cx="57" cy="40" r=".8" opacity=".3"/>
  </g>
</svg>
