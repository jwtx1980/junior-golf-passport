<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80" role="img" aria-labelledby="title">
  <title id="title">Louisiana stamp</title>
  <defs>
    <filter id="rough-louisiana">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="217" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.65"/>
    </filter>
    <style>
      .ink{fill:none;stroke:#9b5a17;stroke-linecap:round;stroke-linejoin:round}
      .fill{fill:#9b5a17}
      .text{fill:#9b5a17;font-family:Inter,Arial,sans-serif;font-size:5.6px;font-weight:900;letter-spacing:.7px}
      .abbr{fill:#9b5a17;font-family:Inter,Arial,sans-serif;font-size:8px;font-weight:950;letter-spacing:1px}
      .mini{fill:#9b5a17;font-family:Inter,Arial,sans-serif;font-size:8px;font-weight:950;letter-spacing:0}
    </style>
  </defs>
  <g filter="url(#rough-louisiana)" opacity=".94">
    <circle class="ink" cx="40" cy="40" r="35" stroke-width="3.2"/>
    <circle class="ink" cx="40" cy="40" r="29" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text class="text" x="40" y="17" text-anchor="middle">LOUISIANA</text>
    <g>
    <path class="ink" d="M54 35c-5-8-19-9-27-2-8 7-4 18 7 20 9 2 17-2 18-10" stroke-width="2.5"/>
    <path class="ink" d="M38 33c4 5 4 13 0 19M47 36c2 4 2 8 0 12M27 33l-6-4M28 43l-8 2M54 35l5-4M53 40h6" stroke-width="1.8"/>
    <circle class="fill" cx="50" cy="34" r="1.4"/></g>
    <text class="abbr" x="40" y="68" text-anchor="middle">LA - SHRIMP</text>
    <circle class="fill" cx="19" cy="48" r=".9" opacity=".32"/>
    <circle class="fill" cx="59" cy="39" r=".8" opacity=".3"/>
  </g>
</svg>
