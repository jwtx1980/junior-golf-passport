<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80" role="img" aria-labelledby="title">
  <title id="title">Kansas stamp</title>
  <defs>
    <filter id="rough-kansas">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="215" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.65"/>
    </filter>
    <style>
      .ink{fill:none;stroke:#1f6b4c;stroke-linecap:round;stroke-linejoin:round}
      .fill{fill:#1f6b4c}
      .text{fill:#1f6b4c;font-family:Inter,Arial,sans-serif;font-size:5.6px;font-weight:900;letter-spacing:.7px}
      .abbr{fill:#1f6b4c;font-family:Inter,Arial,sans-serif;font-size:8px;font-weight:950;letter-spacing:1px}
      .mini{fill:#1f6b4c;font-family:Inter,Arial,sans-serif;font-size:8px;font-weight:950;letter-spacing:0}
    </style>
  </defs>
  <g filter="url(#rough-kansas)" opacity=".94">
    <circle class="ink" cx="40" cy="40" r="35" stroke-width="3.2"/>
    <circle class="ink" cx="40" cy="40" r="29" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text class="text" x="40" y="17" text-anchor="middle">KANSAS</text>
    <g>
    <circle class="ink" cx="40" cy="39" r="7" stroke-width="2.2"/>
    <path class="ink" d="M40 20l3 12-3 7-3-7zM40 58l-3-12 3-7 3 7zM21 39l12-3 7 3-7 3zM59 39l-12 3-7-3 7-3zM27 26l10 6 3 7-7-3zM53 52l-10-6-3-7 7 3zM53 26l-6 10-7 3 3-7zM27 52l6-10 7-3-3 7z" stroke-width="1.7"/></g>
    <text class="abbr" x="40" y="68" text-anchor="middle">KS - SUNFLOWER</text>
    <circle class="fill" cx="21" cy="46" r=".9" opacity=".32"/>
    <circle class="fill" cx="61" cy="37" r=".8" opacity=".3"/>
  </g>
</svg>
