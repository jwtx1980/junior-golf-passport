<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80" role="img" aria-labelledby="title">
  <title id="title">Arkansas stamp</title>
  <defs>
    <filter id="rough-arkansas">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="203" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.65"/>
    </filter>
    <style>
      .ink{fill:none;stroke:#d8634b;stroke-linecap:round;stroke-linejoin:round}
      .fill{fill:#d8634b}
      .text{fill:#d8634b;font-family:Inter,Arial,sans-serif;font-size:5.6px;font-weight:900;letter-spacing:.7px}
      .abbr{fill:#d8634b;font-family:Inter,Arial,sans-serif;font-size:8px;font-weight:950;letter-spacing:1px}
      .mini{fill:#d8634b;font-family:Inter,Arial,sans-serif;font-size:8px;font-weight:950;letter-spacing:0}
    </style>
  </defs>
  <g filter="url(#rough-arkansas)" opacity=".94">
    <circle class="ink" cx="40" cy="40" r="35" stroke-width="3.2"/>
    <circle class="ink" cx="40" cy="40" r="29" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text class="text" x="40" y="17" text-anchor="middle">ARKANSAS</text>
    <g>
    <path class="ink" d="M40 22l18 15-18 20-18-20z" stroke-width="2.5"/>
    <path class="ink" d="M22 37h36M32 37l8 20 8-20M31 23l9 14 9-14" stroke-width="1.7"/></g>
    <text class="abbr" x="40" y="68" text-anchor="middle">AR - DIAMOND</text>
    <circle class="fill" cx="21" cy="43" r=".9" opacity=".32"/>
    <circle class="fill" cx="58" cy="36" r=".8" opacity=".3"/>
  </g>
</svg>
