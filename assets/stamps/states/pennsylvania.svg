<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80" role="img" aria-labelledby="title">
  <title id="title">Pennsylvania stamp</title>
  <defs>
    <filter id="rough-pennsylvania">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="237" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.65"/>
    </filter>
    <style>
      .ink{fill:none;stroke:#9b5a17;stroke-linecap:round;stroke-linejoin:round}
      .fill{fill:#9b5a17}
      .text{fill:#9b5a17;font-family:Inter,Arial,sans-serif;font-size:5px;font-weight:900;letter-spacing:.7px}
      .abbr{fill:#9b5a17;font-family:Inter,Arial,sans-serif;font-size:8px;font-weight:950;letter-spacing:1px}
      .mini{fill:#9b5a17;font-family:Inter,Arial,sans-serif;font-size:8px;font-weight:950;letter-spacing:0}
    </style>
  </defs>
  <g filter="url(#rough-pennsylvania)" opacity=".94">
    <circle class="ink" cx="40" cy="40" r="35" stroke-width="3.2"/>
    <circle class="ink" cx="40" cy="40" r="29" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text class="text" x="40" y="17" text-anchor="middle">PENNSYLVANIA</text>
    <g>
    <path class="ink" d="M31 24h18l-3 31H34z" stroke-width="2.4"/>
    <path class="ink" d="M31 35h18M30 55h20M40 24v-5M35 41h10M34 48h12" stroke-width="1.8"/>
    <path class="ink" d="M44 28l-8 24" stroke-width="1.3" opacity=".6"/></g>
    <text class="abbr" x="40" y="68" text-anchor="middle">PA - BELL</text>
    <circle class="fill" cx="19" cy="41" r=".9" opacity=".32"/>
    <circle class="fill" cx="59" cy="37" r=".8" opacity=".3"/>
  </g>
</svg>
