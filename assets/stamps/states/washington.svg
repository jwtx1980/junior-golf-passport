<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80" role="img" aria-labelledby="title">
  <title id="title">Washington stamp</title>
  <defs>
    <filter id="rough-washington">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="246" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.65"/>
    </filter>
    <style>
      .ink{fill:none;stroke:#1d3142;stroke-linecap:round;stroke-linejoin:round}
      .fill{fill:#1d3142}
      .text{fill:#1d3142;font-family:Inter,Arial,sans-serif;font-size:5.6px;font-weight:900;letter-spacing:.7px}
      .abbr{fill:#1d3142;font-family:Inter,Arial,sans-serif;font-size:8px;font-weight:950;letter-spacing:1px}
      .mini{fill:#1d3142;font-family:Inter,Arial,sans-serif;font-size:8px;font-weight:950;letter-spacing:0}
    </style>
  </defs>
  <g filter="url(#rough-washington)" opacity=".94">
    <circle class="ink" cx="40" cy="40" r="35" stroke-width="3.2"/>
    <circle class="ink" cx="40" cy="40" r="29" stroke-width="1.5" stroke-dasharray="3 3"/>
    <text class="text" x="40" y="17" text-anchor="middle">WASHINGTON</text>
    <g>
    <path class="ink" d="M28 34h22v13c0 6-4 10-11 10s-11-4-11-10z" stroke-width="2.4"/>
    <path class="ink" d="M50 38h5c4 0 4 9 0 9h-5M31 29c-3-4 3-5 0-9M40 29c-3-4 3-5 0-9M49 29c-3-4 3-5 0-9" stroke-width="1.7"/>
    <path class="ink" d="M24 57h31" stroke-width="1.8"/></g>
    <text class="abbr" x="40" y="68" text-anchor="middle">WA - COFFEE</text>
    <circle class="fill" cx="20" cy="41" r=".9" opacity=".32"/>
    <circle class="fill" cx="60" cy="35" r=".8" opacity=".3"/>
  </g>
</svg>
