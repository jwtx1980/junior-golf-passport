<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80" role="img" aria-labelledby="title">
  <title id="title">Hawaii stamp</title>
  <defs>
    <filter id="rough-hawaii">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="210" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.65"/>
    </filter>
    <style>
      .ink{fill:none;stroke:#1f6b4c;stroke-linecap:round;stroke-linejoin:round}
      .fill{fill:#1f6b4c}
      .text{fill:#1f6b4c;font-family:Inter,Arial,sans-serif;font-size:5.6px;font-weight:900;letter-spacing:.7px}
      .abbr{fill:#1f6b4c;font-family:Inter,Arial,sans-serif;font-size:8px;font-weight:950;letter-spacing:1px}
      .mini{fill:#1f6b4c;font-family:Inter,Arial,sans-serif;font-size:8px;font-weight:950;letter-spacing:0}
    </style>
  </defs>
  <g filter="url(#rough-hawaii)" opacity=".94">
    <circle class="ink" cx="40" cy="40" r="35" stroke-width="3.2"/>
    <circle class="ink" cx="40" cy="40" r="29" stroke-width="1.5" stroke-dasharray="3 3"/>
    <text class="text" x="40" y="17" text-anchor="middle">HAWAII</text>
    <g>
    <path class="ink" d="M30 36c0-8 20-8 20 0v12c0 9-20 9-20 0z" stroke-width="2.4"/>
    <path class="ink" d="M40 19v13M34 31l-7-8M46 31l7-8M37 32l-1-11M43 32l1-11" stroke-width="2"/>
    <path class="ink" d="M31 40h18M31 48h18M34 36l16 16M46 36L30 52" stroke-width="1.5"/></g>
    <text class="abbr" x="40" y="68" text-anchor="middle">HI - PINEAPPLE</text>
    <circle class="fill" cx="20" cy="41" r=".9" opacity=".32"/>
    <circle class="fill" cx="61" cy="43" r=".8" opacity=".3"/>
  </g>
</svg>
