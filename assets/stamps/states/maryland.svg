<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80" role="img" aria-labelledby="title">
  <title id="title">Maryland stamp</title>
  <defs>
    <filter id="rough-maryland">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="219" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.65"/>
    </filter>
    <style>
      .ink{fill:none;stroke:#174d39;stroke-linecap:round;stroke-linejoin:round}
      .fill{fill:#174d39}
      .text{fill:#174d39;font-family:Inter,Arial,sans-serif;font-size:5.6px;font-weight:900;letter-spacing:.7px}
      .abbr{fill:#174d39;font-family:Inter,Arial,sans-serif;font-size:8px;font-weight:950;letter-spacing:1px}
      .mini{fill:#174d39;font-family:Inter,Arial,sans-serif;font-size:8px;font-weight:950;letter-spacing:0}
    </style>
  </defs>
  <g filter="url(#rough-maryland)" opacity=".94">
    <circle class="ink" cx="40" cy="40" r="35" stroke-width="3.2"/>
    <circle class="ink" cx="40" cy="40" r="29" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text class="text" x="40" y="17" text-anchor="middle">MARYLAND</text>
    <g>
    <ellipse class="ink" cx="40" cy="42" rx="14" ry="10" stroke-width="2.4"/>
    <path class="ink" d="M26 38l-8-6M54 38l8-6M28 47l-8 5M52 47l8 5M32 52l-4 6M48 52l4 6M33 38h2M45 38h2" stroke-width="2"/>
    <path class="ink" d="M19 32c-2-5 4-8 7-4M61 32c2-5-4-8-7-4" stroke-width="2"/></g>
    <text class="abbr" x="40" y="68" text-anchor="middle">MD - CRAB</text>
    <circle class="fill" cx="21" cy="41" r=".9" opacity=".32"/>
    <circle class="fill" cx="57" cy="41" r=".8" opacity=".3"/>
  </g>
</svg>
