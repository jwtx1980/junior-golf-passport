<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80" role="img" aria-labelledby="title">
  <title id="title">Virginia stamp</title>
  <defs>
    <filter id="rough-virginia">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="245" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.65"/>
    </filter>
    <style>
      .ink{fill:none;stroke:#1f6b4c;stroke-linecap:round;stroke-linejoin:round}
      .fill{fill:#1f6b4c}
      .text{fill:#1f6b4c;font-family:Inter,Arial,sans-serif;font-size:5.6px;font-weight:900;letter-spacing:.7px}
      .abbr{fill:#1f6b4c;font-family:Inter,Arial,sans-serif;font-size:8px;font-weight:950;letter-spacing:1px}
      .mini{fill:#1f6b4c;font-family:Inter,Arial,sans-serif;font-size:8px;font-weight:950;letter-spacing:0}
    </style>
  </defs>
  <g filter="url(#rough-virginia)" opacity=".94">
    <circle class="ink" cx="40" cy="40" r="35" stroke-width="3.2"/>
    <circle class="ink" cx="40" cy="40" r="29" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text class="text" x="40" y="17" text-anchor="middle">VIRGINIA</text>
    <g>
    <path class="ink" d="M40 39c-8-5-10-12-5-17 5 2 7 8 5 17zM40 39c5-8 12-10 17-5-2 5-8 7-17 5zM40 39c8 5 10 12 5 17-5-2-7-8-5-17zM40 39c-5 8-12 10-17 5 2-5 8-7 17-5z" stroke-width="2"/>
    <circle class="ink" cx="40" cy="39" r="3" stroke-width="1.8"/></g>
    <text class="abbr" x="40" y="68" text-anchor="middle">VA - DOGWOOD</text>
    <circle class="fill" cx="19" cy="40" r=".9" opacity=".32"/>
    <circle class="fill" cx="61" cy="34" r=".8" opacity=".3"/>
  </g>
</svg>
