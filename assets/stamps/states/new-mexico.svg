<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80" role="img" aria-labelledby="title">
  <title id="title">New Mexico stamp</title>
  <defs>
    <filter id="rough-new-mexico">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="230" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.65"/>
    </filter>
    <style>
      .ink{fill:none;stroke:#1f6b4c;stroke-linecap:round;stroke-linejoin:round}
      .fill{fill:#1f6b4c}
      .text{fill:#1f6b4c;font-family:Inter,Arial,sans-serif;font-size:5.6px;font-weight:900;letter-spacing:.7px}
      .abbr{fill:#1f6b4c;font-family:Inter,Arial,sans-serif;font-size:8px;font-weight:950;letter-spacing:1px}
      .mini{fill:#1f6b4c;font-family:Inter,Arial,sans-serif;font-size:8px;font-weight:950;letter-spacing:0}
    </style>
  </defs>
  <g filter="url(#rough-new-mexico)" opacity=".94">
    <circle class="ink" cx="40" cy="40" r="35" stroke-width="3.2"/>
    <circle class="ink" cx="40" cy="40" r="29" stroke-width="1.5" stroke-dasharray="3 3"/>
    <text class="text" x="40" y="17" text-anchor="middle">NEW MEXICO</text>
    <g>
    <path class="ink" d="M31 31c15-2 26 9 22 21-3 8-17 5-20-4-2-6-1-12-2-17z" stroke-width="2.4"/>
    <path class="ink" d="M31 31c2-6 7-9 13-8M43 24c-2 4-5 6-10 7M38 44c4 5 9 8 15 8" stroke-width="1.8"/></g>
    <text class="abbr" x="40" y="68" text-anchor="middle">NM - CHILE</text>
    <circle class="fill" cx="20" cy="43" r=".9" opacity=".32"/>
    <circle class="fill" cx="61" cy="41" r=".8" opacity=".3"/>
  </g>
</svg>
