    <text class="text" x="40" y="18" text-anchor="middle">FIRST</text>
    <text class="text" x="40" y="67" text-anchor="middle">EAGLE</text>
    <path class="ink" d="M20 28h5M56 29h5M20 55l5-2M55 53l5 2" stroke-width="1.4" opacity=".48"/>
