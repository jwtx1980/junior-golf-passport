<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Kara Walker Golfed States Map</title>
  <style>
    :root {
      --bg: #f7f4ec;
      --panel: #fffdf7;
      --ink: #252822;
      --muted: #687066;
      --line: #d8d1bf;
      --green: #2f6d3c;
      --amber: #d7a534;
      --blue: #4b83a8;
      --red: #d44832;
      --empty: #eef1eb;
      --shadow: 0 16px 42px rgba(52, 46, 33, .16);
    }

    * { box-sizing: border-box; }

    html { background: var(--bg); }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, rgba(75, 131, 168, .13), rgba(215, 165, 52, .1)), var(--bg);
    }

    button, input, select, textarea { font: inherit; }

    .app { min-height: 100vh; }

    .map-hero {
      position: relative;
      min-height: 58vh;
      padding: clamp(12px, 3vw, 24px);
      border-bottom: 1px solid var(--line);
      background: #dfe9df;
      overflow: hidden;
    }

    .map-shell {
      position: relative;
      width: min(1180px, 100%);
      margin: 0 auto;
      border: 1px solid rgba(37, 40, 34, .13);
      border-radius: 8px;
      background: #f7fbf5;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .map-title {
      position: absolute;
      z-index: 2;
      top: 14px;
      left: 14px;
      max-width: min(430px, calc(100% - 28px));
      padding: 13px 15px;
      border: 1px solid rgba(37, 40, 34, .12);
      border-radius: 8px;
      background: rgba(255, 253, 247, .93);
      box-shadow: 0 10px 24px rgba(52, 46, 33, .13);
    }

    h1 { margin: 0; font-size: 27px; line-height: 1.06; letter-spacing: 0; }

    .subtitle { margin: 6px 0 0; color: var(--muted); line-height: 1.4; font-size: 14px; }

    .map-svg {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 1000 / 720;
      touch-action: manipulation;
      background: #e4efe5;
    }

    .state {
      fill: var(--empty);
      stroke: #aeb8ac;
      stroke-width: 1;
      vector-effect: non-scaling-stroke;
      transition: fill .18s ease, opacity .18s ease, stroke .18s ease;
    }

    .state.played-one { fill: var(--amber); stroke: #fffdf7; stroke-width: 1.35; }
    .state.played-some { fill: var(--blue); stroke: #fffdf7; stroke-width: 1.35; }
    .state.played-many { fill: var(--green); stroke: #fffdf7; stroke-width: 1.55; }
    .state.is-selected { stroke: #20251f; stroke-width: 2.4; }

    .inset-label { fill: rgba(37, 40, 34, .56); font-size: 16px; font-weight: 800; letter-spacing: .08em; }
    .inset-box { fill: rgba(255, 253, 247, .62); stroke: rgba(37, 40, 34, .16); stroke-width: 1; }

    .pin { cursor: pointer; }
    .pin circle { fill: var(--red); stroke: #fffdf7; stroke-width: 2.6; vector-effect: non-scaling-stroke; }
    .pin text { fill: #252822; font-size: 13px; font-weight: 800; paint-order: stroke; stroke: #fffdf7; stroke-width: 4; stroke-linejoin: round; }
    .pin.is-selected circle { fill: #151915; stroke: var(--amber); stroke-width: 4; }

    .map-card {
      width: min(1180px, calc(100% - 2 * clamp(12px, 3vw, 24px)));
      margin: 10px auto 0;
      padding: 12px 13px;
      border: 1px solid rgba(37, 40, 34, .12);
      border-radius: 8px;
      background: rgba(255, 253, 247, .94);
      box-shadow: 0 10px 24px rgba(52, 46, 33, .15);
    }

    .map-card strong { display: block; color: var(--green); font-size: 14px; line-height: 1.2; }
    .map-card span { display: block; margin-top: 4px; color: var(--muted); font-size: 12px; line-height: 1.35; }

    .legend { display: flex; flex-wrap: wrap; gap: 8px 14px; margin-top: 12px; color: var(--muted); font-size: 12px; }
    .legend-row { display: inline-flex; align-items: center; gap: 7px; white-space: nowrap; }
    .swatch { width: 16px; height: 16px; border-radius: 4px; border: 1px solid rgba(37, 40, 34, .14); }

    .content {
      width: min(1180px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 18px;
      padding: 22px clamp(14px, 3vw, 28px) 34px;
    }

    .title-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; }
    .log-title { margin: 0; font-size: 18px; line-height: 1.2; letter-spacing: 0; }

    .reset {
      width: 36px;
      height: 36px;
      display: inline-grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      background: #fff;
      cursor: pointer;
    }

    .reset:hover { color: #b54d3f; border-color: rgba(181, 77, 63, .45); }

    .stats { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; width: min(430px, 100%); }
    .stat { padding: 12px; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
    .stat b { display: block; font-size: 24px; line-height: 1; }
    .stat span { display: block; margin-top: 6px; color: var(--muted); font-size: 12px; }

    .section { display: grid; gap: 10px; }
    .section h2 { margin: 0; color: var(--green); font-size: 13px; letter-spacing: .08em; text-transform: uppercase; }

    .course-list, .needs-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 8px; }

    .course {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      min-height: 76px;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      text-align: left;
      cursor: pointer;
    }

    .course:hover, .course.is-selected { border-color: rgba(75, 131, 168, .6); box-shadow: 0 8px 20px rgba(75, 131, 168, .13); }
    .course strong { display: block; font-size: 14px; line-height: 1.2; }
    .course small, .need { color: var(--muted); font-size: 12px; line-height: 1.4; }

    .badge {
      align-self: start;
      min-width: 34px;
      padding: 4px 8px;
      border-radius: 999px;
      text-align: center;
      color: var(--green);
      background: rgba(47, 109, 60, .12);
      font-size: 12px;
      font-weight: 800;
    }

    .need { padding: 9px 10px; border-left: 3px solid var(--amber); background: rgba(215, 165, 52, .11); border-radius: 0 8px 8px 0; }

    form { display: grid; gap: 9px; max-width: 760px; padding: 12px; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
    .field-grid { display: grid; grid-template-columns: 1fr 112px; gap: 9px; }
    .coord-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    label { display: grid; gap: 5px; color: var(--muted); font-size: 12px; }
    input, select, textarea { width: 100%; border: 1px solid var(--line); border-radius: 8px; padding: 9px 10px; color: var(--ink); background: #fffdf9; outline: none; }
    textarea { min-height: 58px; resize: vertical; }
    input:focus, select:focus, textarea:focus { border-color: rgba(75, 131, 168, .65); box-shadow: 0 0 0 3px rgba(75, 131, 168, .12); }
    .actions { display: grid; grid-template-columns: 1fr auto; gap: 8px; }
    .primary, .secondary { border: 1px solid transparent; border-radius: 8px; padding: 10px 12px; font-weight: 800; cursor: pointer; }
    .primary { color: #fff; background: var(--green); }
    .primary:hover { background: #245b31; }
    .secondary { color: var(--muted); background: #fff; border-color: var(--line); }
    .secondary:hover { color: var(--ink); border-color: rgba(75, 131, 168, .45); }

    @media (max-width: 760px) {
      .map-hero { min-height: auto; padding: 0; background: #e4efe5; }
      .map-shell { width: 100%; border: 0; border-radius: 0; box-shadow: none; }
      .map-svg { aspect-ratio: 1000 / 760; min-height: 430px; }
      .map-title { top: 10px; left: 10px; max-width: calc(100% - 20px); padding: 10px 11px; }
      h1 { font-size: 21px; }
      .map-title .subtitle { font-size: 12px; }
      .map-card { width: calc(100% - 20px); margin-top: 10px; }
      .legend { padding: 0 12px 12px; margin-top: 0; background: #f7fbf5; }
      .content { padding: 18px 14px 30px; }
      .stats, .field-grid, .coord-grid, .actions { grid-template-columns: 1fr; }
      .course-list { grid-template-columns: 1fr; }
      .course { text-align: center; grid-template-columns: 1fr; }
      .badge { justify-self: center; }
    }

    body.embed-profile {
      background: transparent;
      min-height: 0;
    }

    body.embed-profile .app {
      min-height: 0;
    }

    body.embed-profile .map-hero {
      background: transparent;
      border: 0;
      min-height: 0;
      padding: 0;
    }

    body.embed-profile .map-shell {
      border: 0;
      box-shadow: none;
      margin: 0 auto;
      width: 100%;
    }

    body.embed-profile .map-title,
    body.embed-profile .map-card,
    body.embed-profile .legend,
    body.embed-profile .content {
      display: none !important;
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="map-hero" aria-label="United States golf map">
      <div class="map-shell">
        <div class="map-title">
          <h1>Kara Walker Golfed States Map</h1>
        </div>
        <svg class="map-svg" id="usMap" viewBox="0 0 1000 720" role="img" aria-label="Map of United States golf courses">
          <rect class="inset-box" x="48" y="520" width="292" height="178" rx="8"></rect>
          <rect class="inset-box" x="332" y="602" width="176" height="96" rx="8"></rect>
          <text class="inset-label" x="64" y="544">AK</text>
          <text class="inset-label" x="348" y="626">HI</text>
          <g id="stateLayer"></g>
          <g id="pinLayer"></g>
        </svg>
      </div>
      <div class="map-card" id="mapCard" aria-live="polite"></div>
      <div class="legend" aria-label="Map legend">
        <div class="legend-row"><span class="swatch" style="background:#eef1eb"></span>Not logged</div>
        <div class="legend-row"><span class="swatch" style="background:#d7a534"></span>1 course</div>
        <div class="legend-row"><span class="swatch" style="background:#4b83a8"></span>2-3 courses</div>
        <div class="legend-row"><span class="swatch" style="background:#2f6d3c"></span>4+ courses</div>
      </div>
    </section>

    <section class="content">
      <div class="title-row">
        <div>
          <h2 class="log-title">Kara Walker's golf log</h2>
        </div>
        <button class="reset" id="resetData" type="button" title="Reset saved additions" aria-label="Reset saved additions">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path d="M3 12a9 9 0 1 0 3-6.7M3 4v5h5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <section class="stats" aria-label="Golf map totals">
        <div class="stat"><b id="stateCount">0</b><span>states</span></div>
        <div class="stat"><b id="courseCount">0</b><span>courses</span></div>
        <div class="stat"><b id="pinCount">0</b><span>pins</span></div>
      </section>

      <section class="section">
        <h2>Courses Logged</h2>
        <div class="course-list" id="courseList"></div>
      </section>

      <section class="section" id="needsSection" hidden>
        <h2>Needs Confirmation</h2>
        <div class="needs-list" id="needsList"></div>
      </section>

      <section class="section">
        <h2>Add Course</h2>
        <form id="courseForm" autocomplete="off">
          <div class="field-grid">
            <label>Course<input id="nameInput" required placeholder="Course name"></label>
            <label>State<select id="stateInput" required></select></label>
          </div>
          <label>City / area<input id="cityInput" placeholder="City, area, or note"></label>
          <div class="coord-grid">
            <label>Latitude<input id="latInput" inputmode="decimal" placeholder="optional"></label>
            <label>Longitude<input id="lngInput" inputmode="decimal" placeholder="optional"></label>
          </div>
          <label>Notes<textarea id="notesInput" placeholder="Who you played with, date, score, tees, etc."></textarea></label>
          <div class="actions">
            <button class="primary" type="submit">Add to map</button>
            <button class="secondary" type="button" id="clearForm">Clear</button>
          </div>
        </form>
      </section>
    </section>
  </main>

  <script src="/config.js"></script>

    const seedCourses = [{"id":"kona-cc","name":"Kona Country Club","city":"Kailua-Kona","state":"HI","lat":19.562206,"lng":-155.958835},{"id":"grand-bear","name":"Grand Bear Golf Club","city":"Saucier","state":"MS","lat":30.509089,"lng":-89.060175},{"id":"pine-ridge-paris","name":"Pine Ridge Golf Course","city":"Paris","state":"TX","lat":33.6686516,"lng":-95.4827126},{"id":"daingerfield-cc","name":"Daingerfield Country Club","city":"Daingerfield","state":"TX","lat":33.024995,"lng":-94.707403},{"id":"princedale","name":"Princedale Country Club","city":"Pittsburg","state":"TX","lat":32.9985723,"lng":-94.9541275},{"id":"crossing-creeks","name":"Crossing Creeks Country Club","city":"Longview","state":"TX","lat":32.5444471,"lng":-94.7564489},{"id":"eagles-bluff","name":"Eagle's Bluff Country Club","city":"Bullard","state":"TX","lat":32.142297,"lng":-95.426395},{"id":"hollytree","name":"Hollytree Country Club","city":"Tyler","state":"TX","lat":32.2741803,"lng":-95.3179622},{"id":"cedar-creek-championship","name":"The Championship Course at Cedar Creek Country Club","city":"Kemp","state":"TX","lat":32.3842039,"lng":-96.164675}];
    const needsConfirmation = [];
    const storageKey = "kara-walker-golfed-states-map-courses-v1";
    const svgNS = "http://www.w3.org/2000/svg";
    let liveCourses = [];
    let userCourses = loadUserCourses();
    let selectedCourseId = seedCourses[0].id;
    let selectedStateCode = null;

    const elements = {
      stateCount: document.getElementById("stateCount"),
      courseCount: document.getElementById("courseCount"),
      pinCount: document.getElementById("pinCount"),
      courseList: document.getElementById("courseList"),
      needsList: document.getElementById("needsList"),
      needsSection: document.getElementById("needsSection"),
      stateLayer: document.getElementById("stateLayer"),
      pinLayer: document.getElementById("pinLayer"),
      mapCard: document.getElementById("mapCard"),
      map: document.getElementById("usMap"),
      form: document.getElementById("courseForm"),
      name: document.getElementById("nameInput"),
      state: document.getElementById("stateInput"),
      city: document.getElementById("cityInput"),
      lat: document.getElementById("latInput"),
      lng: document.getElementById("lngInput"),
      notes: document.getElementById("notesInput"),
      clearForm: document.getElementById("clearForm"),
      resetData: document.getElementById("resetData")
    };

    hydrateStateSelect();
    hydrateNeedsList();
    render();
    loadLiveCourses();

    elements.map.addEventListener("click", (event) => {
      if (event.target.closest("[data-state]")) return;
      if (event.target.closest(".pin")) return;
      clearSelection();
    });

    elements.form.addEventListener("submit", (event) => {
      event.preventDefault();
      const lat = parseOptionalNumber(elements.lat.value);
      const lng = parseOptionalNumber(elements.lng.value);
      if ((lat === null) !== (lng === null)) {
        window.alert("Add both latitude and longitude, or leave both blank.");
        return;
      }
      const course = {
        id: `user-${Date.now()}`,
        name: elements.name.value.trim(),
        city: elements.city.value.trim(),
        state: elements.state.value,
        lat,
        lng,
        notes: elements.notes.value.trim()
      };
      userCourses.push(course);
      selectedCourseId = course.id;
      selectedStateCode = course.state;
      saveUserCourses();
      clearForm();
      render();
      elements.map.scrollIntoView({ behavior: "smooth", block: "start" });
    });

    elements.clearForm.addEventListener("click", clearForm);
    elements.resetData.addEventListener("click", () => {
      if (!userCourses.length) return;
      if (!window.confirm("Remove only the courses added in this browser? The built-in starter list stays.")) return;
      userCourses = [];
      saveUserCourses();
      selectedCourseId = seedCourses[0].id;
      selectedStateCode = seedCourses[0].state;
      render();
    });

    function getAllCourses() {
      return [...(liveCourses.length ? liveCourses : seedCourses), ...userCourses].filter((course) => course.name && course.state);
    }

    function loadLiveCourses() {
      const config = window.JGP_CONFIG;
      if (!config || !config.passportApiBaseUrl) return;
      fetch(`${config.passportApiBaseUrl}/golfers/kara/public`)
        .then((response) => {
          if (!response.ok) throw new Error("Live map data unavailable");
          return response.json();
        })
        .then((data) => {
          const records = []
            .concat(Array.isArray(data.rounds) ? data.rounds : [])
            .concat(Array.isArray(data.memories) ? data.memories : [])
            .concat(Array.isArray(data.achievements) ? data.achievements : [])
            .concat(Array.isArray(data.tournaments) ? data.tournaments : []);
          const unique = {};
          liveCourses = records
            .map((record) => record.courses)
            .filter(Boolean)
            .map(normalizeApiCourse)
            .filter((course) => {
              const key = course.id || `${course.name}-${course.state}`;
              if (!course.name || !course.state || unique[key]) return false;
              unique[key] = true;
              return true;
          });
          if (liveCourses.length) {
            selectedCourseId = liveCourses[0].id;
            selectedStateCode = liveCourses[0].state;
            render();
          }
        })
        .catch(() => {
          liveCourses = [];
        });
    }

    function normalizeApiCourse(course) {
      const state = normalizeStateCode(course.state);
      return {
        id: course.id || `api-${course.name}`,
        name: course.name,
        city: course.city || "",
        state,
        lat: parseCoordinate(course.latitude),
        lng: parseCoordinate(course.longitude),
        notes: course.verification_status ? course.verification_status.replace(/_/g, " ") : ""
      };
    }

    function normalizeStateCode(value) {
      const text = String(value || "").trim();
      if (stateNames[text]) return text;
      return stateCodesByName[text.toLowerCase()] || text.toUpperCase().slice(0, 2);
    }

    function parseCoordinate(value) {
      if (value === null || value === undefined || value === "") return null;
      const parsed = Number(value);
      return Number.isFinite(parsed) ? parsed : null;
    }

    function getStateCounts(courses) {
      return courses.reduce((counts, course) => {
        counts[course.state] = (counts[course.state] || 0) + 1;
        return counts;
      }, {});
    }

    function render() {
      const courses = getAllCourses();
      const stateCounts = getStateCounts(courses);
      const pinnedCourses = courses.filter(hasCoordinates);
      if (selectedCourseId && !courses.some((course) => course.id === selectedCourseId)) selectedCourseId = null;

      elements.stateCount.textContent = Object.keys(stateCounts).length;
      elements.courseCount.textContent = courses.length;
      elements.pinCount.textContent = pinnedCourses.length;

      renderStates(stateCounts);
      renderPins(pinnedCourses);
      renderCourseList(courses);
      renderMapCard(courses.find((course) => course.id === selectedCourseId) || courses[0]);
    }

    function renderStates(stateCounts) {
      elements.stateLayer.innerHTML = "";
      statePaths.forEach((state) => {
        const path = document.createElementNS(svgNS, "path");
        const count = stateCounts[state.code] || 0;
        path.setAttribute("d", state.d);
        path.setAttribute("class", `state ${stateClass(count)}${stateIsSelected(state.code) ? " is-selected" : ""}`);
        path.setAttribute("data-state", state.code);
        path.setAttribute("aria-label", `${state.name}: ${count} ${count === 1 ? "course" : "courses"}`);
        path.addEventListener("click", () => selectStateCourse(state.code));
        elements.stateLayer.appendChild(path);
      });
    }

    function renderPins(courses) {
      elements.pinLayer.innerHTML = "";
      courses.forEach((course, index) => {
        const point = projectPoint(course.lng, course.lat, course.state);
        if (!point) return;
        const group = document.createElementNS(svgNS, "g");
        group.setAttribute("class", `pin${course.id === selectedCourseId ? " is-selected" : ""}`);
        group.setAttribute("transform", `translate(${point.x} ${point.y})`);
        group.setAttribute("tabindex", "0");
        group.setAttribute("role", "button");
        group.setAttribute("aria-label", course.name);
        group.addEventListener("click", () => selectCourse(course.id, true));
        group.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            selectCourse(course.id, true);
          }
        });
        const circle = document.createElementNS(svgNS, "circle");
        circle.setAttribute("r", course.id === selectedCourseId ? "8" : "6.5");
        const title = document.createElementNS(svgNS, "title");
        title.textContent = `${course.name} - ${formatCoursePlace(course)}`;
        group.appendChild(title);
        group.appendChild(circle);
        if (course.id === selectedCourseId) {
          const label = document.createElementNS(svgNS, "text");
          label.setAttribute("x", "10");
          label.setAttribute("y", "-10");
          label.textContent = course.state;
          group.appendChild(label);
        }
        elements.pinLayer.appendChild(group);
      });
    }

    function renderCourseList(courses) {
      elements.courseList.innerHTML = "";
      [...courses].sort((a, b) => a.state.localeCompare(b.state) || a.name.localeCompare(b.name)).forEach((course) => {
        const item = document.createElement("button");
        item.type = "button";
        item.className = `course${course.id === selectedCourseId ? " is-selected" : ""}`;
        item.innerHTML = `
          <span>
            <strong>${escapeHtml(course.name)}</strong>
            <small>${escapeHtml(formatCoursePlace(course))}</small>
          </span>
          <span class="badge">${course.state}</span>
        `;
        item.addEventListener("click", () => selectCourse(course.id, true));
        elements.courseList.appendChild(item);
      });
    }

    function renderMapCard(course) {
      if (!course) {
        elements.mapCard.hidden = true;
        return;
      }
      elements.mapCard.hidden = false;
      elements.mapCard.innerHTML = `
        <strong>${escapeHtml(course.name)}</strong>
        <span>${escapeHtml(formatCoursePlace(course))}</span>
        ${course.notes ? `<span>${escapeHtml(course.notes)}</span>` : ""}
      `;
    }

    function selectCourse(courseId, scrollToMap) {
      selectedCourseId = courseId;
      const selected = getAllCourses().find((course) => course.id === courseId);
      selectedStateCode = selected?.state || null;
      render();
      notifyParent({ courseId });
      if (scrollToMap) elements.map.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    function selectStateCourse(stateCode) {
      selectedStateCode = stateCode;
      selectedCourseId = null;
      render();
      notifyParent({ state: stateCode });
    }

    function clearSelection() {
      selectedStateCode = null;
      selectedCourseId = null;
      render();
      notifyParent({ clearState: true });
    }

    function notifyParent(payload) {
      if (!window.parent || window.parent === window) return;
      window.parent.postMessage({ source: "jgp-map", ...payload }, "*");
    }

    function stateIsSelected(stateCode) {
      if (selectedStateCode === stateCode) return true;
      const selected = getAllCourses().find((course) => course.id === selectedCourseId);
      return selected?.state === stateCode;
    }

    function stateClass(count) {
      if (count >= 4) return "played-many";
      if (count >= 2) return "played-some";
      if (count === 1) return "played-one";
      return "";
    }

    function projectPoint(lon, lat, stateCode) {
      const state = stateNames[stateCode];
      if (!Number.isFinite(lon) || !Number.isFinite(lat) || !state) return null;
      if (state === "Alaska") return { x: 70 + ((lon + 189) / 59.5) * 250, y: 675 - ((lat - 51.2) / 20.4) * 145 };
      if (state === "Hawaii") return { x: 350 + ((lon + 160.4) / 6.3) * 140, y: 680 - ((lat - 18.7) / 3.9) * 78 };
      if (state === "Puerto Rico") return { x: 795 + ((lon + 67.4) / 2.0) * 80, y: 676 - ((lat - 17.8) / 0.9) * 38 };
      return { x: 50 + ((lon + 125.0) / 59.0) * 900, y: 600 - ((lat - 24.0) / 26.0) * 540 };
    }

    function hydrateStateSelect() {
      elements.state.innerHTML = Object.entries(stateNames)
        .filter(([code]) => code !== "PR")
        .sort((a, b) => a[1].localeCompare(b[1]))
        .map(([code, name]) => `<option value="${code}">${name}</option>`)
        .join("");
      elements.state.value = "TX";
    }

    function hydrateNeedsList() {
      elements.needsList.innerHTML = needsConfirmation.map((need) => `<div class="need">${escapeHtml(need)}</div>`).join("");
      elements.needsSection.hidden = needsConfirmation.length === 0;
    }

    function loadUserCourses() {
      try {
        const parsed = JSON.parse(localStorage.getItem(storageKey) || "[]");
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveUserCourses() {
      localStorage.setItem(storageKey, JSON.stringify(userCourses));
    }

    function clearForm() {
      elements.form.reset();
      elements.state.value = "TX";
    }

    function hasCoordinates(course) {
      return Number.isFinite(course.lat) && Number.isFinite(course.lng);
    }

    function parseOptionalNumber(value) {
      const trimmed = value.trim();
      if (!trimmed) return null;
      const parsed = Number(trimmed);
      return Number.isFinite(parsed) ? parsed : null;
    }

    function formatCoursePlace(course) {
      return [course.city, stateNames[course.state] || course.state].filter(Boolean).join(", ");
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
